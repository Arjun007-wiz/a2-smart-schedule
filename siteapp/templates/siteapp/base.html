{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Smart Game Scheduling{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="wrap inner">
      <a class="logo" href="{% url 'home' %}">Smart Schedule</a>
      <nav aria-label="Primary">
        <a href="#how">How it works</a>
        <a href="#features">Features</a>
        <a href="#register">Get started</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <div class="wrap">
      <span>Smart Game Scheduling Platform — AI Summit concept</span>
      <span>All scheduling times use Pacific Time (PST/PDT) for consistency.</span>
    </div>
  </footer>
</body>
</html>
